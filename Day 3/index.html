<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lead Management Form</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="form">

            <div class="form__header">
                <h1 class="form__title">Lead Management System</h1>
                <p class="form__subtitle">Manage customer leads efficiently</p>
            </div>

            <form class="form__body">

                <div class="form__group">
                    <label class="form__label" for="name">Full Name</label>
                    <input class="form__input" type="text" id="name" required>
                </div>

                <div class="form__group">
                    <label class="form__label" for="email">Email</label>
                    <input class="form__input" type="email" id="email" required>
                </div>

                <div class="form__group">
                    <label class="form__label" for="phone">Phone</label>
                    <input class="form__input" type="tel" id="phone" required>
                </div>

                <div class="form__group">
                    <label class="form__label" for="company">Company</label>
                    <input class="form__input" type="text" id="company">
                </div>

                <div class="form__group">
                    <label class="form__label" for="source">Lead Source</label>

                    <select class="form__select" id="source">
                        <option>Website</option>
                        <option>Facebook</option>
                        <option>Instagram</option>
                        <option>Referral</option>
                    </select>

                </div>

                <div class="form__group">
                    <label class="form__label" for="message">Notes</label>
                    <textarea class="form__textarea" id="message"></textarea>
                </div>

                <btn class="form__button">Save Lead</btn>

            </form>

        </div>

    </body>
</html>
